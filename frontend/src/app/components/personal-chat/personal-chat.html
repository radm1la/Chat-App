<div class="personal-chat">
  <!-- Header -->
  <div class="chat-header">
    <div class="header-left">
      <div class="avatar">{{ user?.username?.charAt(0).toUpperCase() }}</div>
      <h3>{{ user?.username }}</h3>
    </div>
    <button class="close-btn" (click)="close()">✕</button>
  </div>

  <!-- Messages -->
  <div class="messages-area" #messagesArea>
    <div class="load-more" *ngIf="hasMoreMessages">
      <button (click)="loadMore()">Load older messages</button>
    </div>

    <div 
      class="message"
      *ngFor="let message of messages"
      [class.own-message]="message.sender_id === currentUser?.id"
    >
      <div class="message-avatar">
        {{ message.sender?.username?.charAt(0).toUpperCase() }}
      </div>
      <div class="message-content">
        <div class="message-header">
          <span class="message-username">{{ message.sender?.username }}</span>
          <span class="message-time">{{ message.created_at | date:'HH:mm' }}</span>
          <span class="edited-tag" *ngIf="message.is_edited">edited</span>
        </div>
        <div *ngIf="isFileMessage(message.content); else textMessage">
          <div class="file-card">
            <img
              *ngIf="isImageFile(getFileName(message.content))"
              [src]="getFileUrl(message.content)"
              class="image-preview"
              (click)="openLink(getFileUrl(message.content))"
            />
            <div class="file-card-info">
              <span class="file-icon">📎</span>
              <a [href]="getFileUrl(message.content)" target="_blank" class="file-link">
                {{ getFileName(message.content) }}
              </a>
            </div>
          </div>
        </div>
        <ng-template #textMessage>
          <p class="message-text">{{ message.content }}</p>
        </ng-template>
        <div class="message-actions">
          <button 
            *ngIf="message.sender_id === currentUser?.id"
            (click)="startEdit(message)"
          >✏️</button>
          <button 
            *ngIf="message.sender_id === currentUser?.id"
            (click)="deleteMessage(message)"
          >🗑️</button>
        </div>
      </div>
    </div>
  </div>

  <!-- File preview -->
  <div class="file-preview" *ngIf="selectedFile">
    <span>📎 {{ selectedFile.name }}</span>
    <button (click)="selectedFile = null">✕</button>
  </div>

  <!-- Input -->
  <div class="message-input-area">
    <button class="attach-btn" (click)="fileInput.click()">📎</button>
    <input
      #fileInput
      type="file"
      style="display:none"
      (change)="onFileSelected($event)"
    />
    <textarea
      [(ngModel)]="messageText"
      placeholder="Type a message..."
      (keydown.enter)="onEnterPress($event)"
      (paste)="onPaste($event)"
      rows="1"
    ></textarea>
    <button class="send-btn" (click)="sendMessage()">Send</button>
  </div>
</div>
