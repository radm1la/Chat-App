<div class="personal-chat">
  <!-- Header -->
  <div class="chat-header">
    <div class="header-left">
      <div class="avatar">{{ user?.username?.charAt(0).toUpperCase() }}</div>
      <h3>{{ user?.username }}</h3>
    </div>
    <button class="close-btn" (click)="close()">✕</button>
  </div>

  <!-- Messages -->
  <div class="messages-area" #messagesArea>
    <div class="load-more" *ngIf="hasMoreMessages">
      <button (click)="loadMore()">Load older messages</button>
    </div>

    <div 
      class="message"
      *ngFor="let message of messages"
      [class.own-message]="message.sender_id === currentUser?.id"
    >
      <div class="message-avatar">
        {{ message.sender?.username?.charAt(0).toUpperCase() }}
      </div>
      <div class="message-content">
        <div class="message-header">
          <span class="message-username">{{ message.sender?.username }}</span>
          <span class="message-time">{{ message.created_at | date:'HH:mm' }}</span>
          <span class="edited-tag" *ngIf="message.is_edited">edited</span>
        </div>
        <p class="message-text">{{ message.content }}</p>
        <div class="message-actions">
          <button 
            *ngIf="message.sender_id === currentUser?.id"
            (click)="startEdit(message)"
          >✏️</button>
          <button 
            *ngIf="message.sender_id === currentUser?.id"
            (click)="deleteMessage(message)"
          >🗑️</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="message-input-area">
    <textarea
      [(ngModel)]="messageText"
      placeholder="Type a message..."
      (keydown.enter)="onEnterPress($event)"
      rows="1"
    ></textarea>
    <button class="send-btn" (click)="sendMessage()">Send</button>
  </div>
</div>
